{% extends "base.html" %}
{% block title %}{{ brand.name }} — RepairoX{% endblock %}

{% block content %}
<section class="section">
  <div class="crumbs">
    <a href="{% url 'store:home' %}">Home</a>
    <span>›</span>
    <strong>{{ brand.name }}</strong>
  </div>

  <h2 class="section-title">{{ brand.name }}</h2>

  <ul class="cat-list">
    {% for col in collections %}
      <a href="{{ col.get_absolute_url }}" class="cat-row">
        <span class="cat-name">{{ col.name }}</span>
        <span class="cat-arrow">›</span>
      </a>
    {% empty %}
      <p class="empty">No categories yet for {{ brand.name }}.</p>
    {% endfor %}
  </ul>
</section>
{% endblock %}
