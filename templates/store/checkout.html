{% extends "base.html" %}
{% block title %}Checkout — RepairoX{% endblock %}
{% block content %}
<section class="section">
  <h2 class="section-title">Checkout</h2>
  <div style="display:grid;grid-template-columns:2fr 1fr;gap:30px;align-items:start;">
    <form method="post" action="{% url 'store:checkout' %}">
      {% csrf_token %}
      <div class="field"><label>Full name</label><input name="full_name" required></div>
      <div class="field"><label>Email</label><input type="email" name="email" required></div>
      <div class="field"><label>Phone</label><input name="phone" required></div>
      <div class="field"><label>Address</label><input name="address" required></div>
      <div class="field"><label>City</label><input name="city" required></div>
      <div class="field"><label>Order note (optional)</label><textarea name="note" rows="3"></textarea></div>

      <h4 style="margin:18px 0 8px;">Payment Method</h4>
      <label class="pay-option">
        <input type="radio" name="payment_method" value="cod" checked>
        <span><strong>Cash on Delivery</strong><br>
          <small style="color:var(--muted);">Pay with cash when your order arrives.</small></span>
      </label>
      <label class="pay-option pay-disabled">
        <input type="radio" name="payment_method" value="card" disabled>
        <span><strong>Credit / Debit Card</strong><br>
          <small style="color:var(--muted);">Coming soon.</small></span>
      </label>

      <button type="submit" class="btn btn-block" style="margin-top:18px;">Place Order</button>
    </form>
    <div class="summary">
      <h4 style="margin-top:0;">Order Summary</h4>
      {% for item in cart %}
        <div class="row"><span>{{ item.quantity }} × {{ item.product.name }}</span><span>${{ item.subtotal }}</span></div>
      {% endfor %}
      <div class="row total"><span>Total</span><span>${{ cart.total }}</span></div>
    </div>
  </div>
</section>
{% endblock %}
