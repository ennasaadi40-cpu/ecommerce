# Render Blueprint for RepairoX
databases:
  - name: repairox-db
    plan: free
    databaseName: repairox
    user: repairox

services:
  - type: web
    name: repairox
    runtime: python
    plan: free
    branch: main
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --no-input && python manage.py migrate"
    startCommand: "gunicorn qcp_store.wsgi:application"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://*.onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: repairox-db
          property: connectionString
      - key: WEB_CONCURRENCY
        value: "4"
